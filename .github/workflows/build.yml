name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # libcrypto.so සහ libssl.so ඇත්තෙන්ම text symlink files.
      # Git LFS නැතිව GitHub-ට upload කරොත් ඒවා text files විදිහට
      # upload වෙනවා. ඒ නිසා build කිරීමට පෙර symlinks නිවැරදි කරනවා.
      - name: Fix JNI symlinks (libcrypto.so → libcryptox.so, libssl.so → libsslx.so)
        run: |
          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            DIR="app/src/main/jniLibs/$ABI"
            if [ -f "$DIR/libcrypto.so" ]; then
              CONTENT=$(cat "$DIR/libcrypto.so")
              if [ "$CONTENT" = "libcryptox.so" ]; then
                echo "Fixing $DIR/libcrypto.so symlink"
                cp "$DIR/libcryptox.so" "$DIR/libcrypto.so"
              fi
            fi
            if [ -f "$DIR/libssl.so" ]; then
              CONTENT=$(cat "$DIR/libssl.so")
              if [ "$CONTENT" = "libsslx.so" ]; then
                echo "Fixing $DIR/libssl.so symlink"
                cp "$DIR/libsslx.so" "$DIR/libssl.so"
              fi
            fi
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

